<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin · AHSAA Football Playoff Brackets</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23e01b1b'/%3E%3Ctext x='16' y='23' font-size='20' font-family='Arial' font-weight='bold' fill='white' text-anchor='middle'%3EA%3C/text%3E%3C/svg%3E" />
  <meta name="robots" content="noindex" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="index.html">
        <span>AHSAA Playoffs <small>Admin Suite</small></span>
      </a>
      <span class="header-spacer"></span>
      <button class="icon-btn" id="themeBtn" type="button">🌙 Dark</button>
      <a class="btn btn-sm" href="index.html">View Site</a>
      <button class="btn btn-sm" id="logoutBtn" type="button" style="display:none">Log out</button>
    </div>
  </header>

  <!-- LOGIN -->
  <div id="loginView">
    <div class="login-wrap">
      <div class="login-card">
        <h2>Admin Login</h2>
        <p class="sub">Sign in to manage brackets and standings.</p>
        <div class="field">
          <label for="loginEmail">Email</label>
          <input type="email" id="loginEmail" autocomplete="username" placeholder="you@example.com" />
        </div>
        <div class="field">
          <label for="loginPass">Password</label>
          <input type="password" id="loginPass" autocomplete="current-password" placeholder="••••••••" />
        </div>
        <button class="btn btn-primary" id="loginBtn" type="button" style="width:100%">Sign in</button>
        <div class="login-error" id="loginError"></div>
      </div>
    </div>
  </div>

  <!-- ADMIN -->
  <main id="adminView" class="container" style="display:none">
    <div class="status-banner" id="statusBanner"></div>

    <div class="panel" style="margin-bottom:18px">
      <div class="toolbar">
        <strong style="font-size:1.05rem">Publish</strong>
        <span class="grow hint">Changes auto-save in this browser. To publish to the live site, Export and commit the file as <code>data/data.json</code>.</span>
        <button class="btn btn-primary btn-sm" id="exportBtn" type="button">⬇ Export JSON</button>
        <button class="btn btn-sm" id="copyBtn" type="button">Copy JSON</button>
        <label class="btn btn-sm" style="margin:0">Import JSON
          <input type="file" id="importInput" accept="application/json" style="display:none" />
        </label>
        <button class="btn btn-sm btn-danger" id="resetBtn" type="button">Reset to published</button>
      </div>
    </div>

    <div class="panel" style="margin-bottom:18px">
      <h3>Site Settings</h3>
      <div class="field">
        <label for="seasonInput">Season label</label>
        <input type="text" id="seasonInput" placeholder="2026" style="max-width:200px" />
      </div>
      <div class="field" style="margin-bottom:0">
        <label for="newsInput">Top notes / tiebreakers (shown near the top of the public site)</label>
        <textarea id="newsInput" placeholder="Tiebreaker notes, news, key updates…"></textarea>
      </div>
    </div>

    <div class="admin-class-tabs" id="adminClassTabs"></div>

    <div class="tabs" style="padding:0;margin-bottom:14px;border-bottom:1px solid var(--border)">
      <button class="tab admin-section-tab active" data-section="standings" type="button">Standings &amp; Seeding</button>
      <button class="tab admin-section-tab" data-section="bracket" type="button">Bracket &amp; Results</button>
      <button class="tab admin-section-tab" data-section="projected" type="button">Projected Bracket</button>
    </div>

    <div id="adminBody" class="admin-grid"></div>
  </main>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/admin.js"></script>
</body>
</html>
